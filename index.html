<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Submit Data</title>
  <style>
    :root {
      --ink: #1c2430;
      --muted: #5c6675;
      --line: #d5dae2;
      --accent: #1a5fb4;
      --bg: #eef1f5;
      --card: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 32px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 8px 24px rgba(28, 36, 48, 0.06);
    }
    h1 { font-size: 1.3rem; margin-bottom: 4px; }
    p.sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 20px; }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 6px;
      margin-top: 14px;
    }
    input, textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: inherit;
    }
    textarea { resize: vertical; min-height: 70px; }
    button {
      margin-top: 20px;
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { opacity: 0.9; }
    .link {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 0.85rem;
      color: var(--accent);
      text-decoration: none;
    }
    .link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Submit Details</h1>
    <p class="sub">Fill the form neeche diya gaya, data automatically save ho jayega.</p>
    <form action="submit.php" method="POST">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>

      <label for="address">Address</label>
      <textarea id="address" name="address"></textarea>

      <button type="submit">Submit</button>
    </form>
    <a class="link" href="submissions.php">View all submissions &rarr;</a>
  </div>
</body>
</html>
